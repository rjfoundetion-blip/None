
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupsha Public Welfare Foundation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #1c1e21;
            --card-bg: #ffffff;
            --header-bg: #0f1c2c;
            --accent-color: #00ffaa;
            --font-family: 'Hind Siliguri', 'Poppins', sans-serif;
        }

        .dark-theme {
            --bg-color: #121212;
            --text-color: #e4e6eb;
            --card-bg: #242526;
            --header-bg: #000000;
        }

        body { font-family: var(--font-family); background: var(--bg-color); color: var(--text-color); margin: 0; transition: 0.4s; min-height: 100vh; }
        
        #auth-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f1c2c; padding: 20px; }
        .auth-container { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .logo-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent-color); margin-bottom: 10px; }
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-top: 10px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-primary { background: #0f1c2c; color: white; }
        .btn-phone { background: #25D366; color: white; }
        .btn-link { background: none; color: #1877F2; border: none; cursor: pointer; text-decoration: underline; margin-top: 10px; }
        
        #main-content { display: none; flex-direction: column; min-height: 100vh; }
        header { background: var(--header-bg); padding: 30px; color: white; text-align: center; border-bottom: 4px solid var(--accent-color); position: relative; }
        .top-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .control-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--accent-color); color: white; padding: 6px 12px; border-radius: 15px; cursor: pointer; }
        
        .divider { margin: 20px 0; border-top: 1px solid #eee; position: relative; }
        .divider span { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-container">
            <img src="https://i.ibb.co.com/ycsrjKp6/20251128-004458.jpg" alt="Logo" class="logo-img">
            
            <div id="login-form">
                <h2>লগইন</h2>
                <input type="email" id="login-email" class="auth-input" placeholder="ইমেইল অ্যাড্রেস">
                <input type="password" id="login-pass" class="auth-input" placeholder="পাসওয়ার্ড">
                <button class="auth-btn btn-primary" id="loginSubmit">লগইন করুন</button>
                
                <div class="divider"><span>অথবা</span></div>
                
                <input type="text" id="phone-number" class="auth-input" placeholder="+88017XXXXXXXX">
                <div id="recaptcha-container"></div>
                <button class="auth-btn btn-phone" id="sendOTP">OTP পাঠান</button>
                
                <div id="otp-section" style="display:none;">
                    <input type="text" id="otp-code" class="auth-input" placeholder="৬ ডিজিটের কোড দিন">
                    <button class="auth-btn btn-primary" id="verifyOTP">কোড যাচাই করুন</button>
                </div>

                <button class="btn-link" onclick="showForm('signup')">নতুন অ্যাকাউন্ট খুলুন</button>
            </div>

            <div id="signup-form" style="display:none;">
                <h2>রেজিস্ট্রেশন</h2>
                <input type="text" id="signup-name" class="auth-input" placeholder="আপনার নাম">
                <input type="email" id="signup-email" class="auth-input" placeholder="ইমেইল অ্যাড্রেস">
                <input type="password" id="signup-pass" class="auth-input" placeholder="নতুন পাসওয়ার্ড">
                <button class="auth-btn btn-primary" id="signupSubmit" style="background: #188038;">রেজিস্ট্রেশন করুন</button>
                <button class="btn-link" onclick="showForm('login')">ইতিমধ্যেই অ্যাকাউন্ট আছে? লগইন করুন</button>
            </div>

            <p id="auth-msg" style="display:none; padding:10px; margin-top:10px; border-radius:8px; font-size:14px;"></p>
        </div>
    </div>

    <div id="main-content">
        <header>
            <div class="top-controls">
                <button class="control-btn" onclick="toggleDarkMode()" id="themeIcon"><i class="fas fa-moon"></i></button>
                <button class="control-btn" onclick="logoutUser()" style="border-color:#ff4d4d; color:#ff4d4d;">লগআউট</button>
            </div>
            <img src="https://i.ibb.co.com/ycsrjKp6/20251128-004458.jpg" alt="Logo" class="logo-img">
            <div id="userNameDisplay" style="color:var(--accent-color); font-weight:bold;">Processing...</div>
            <h1>রুপসা জনকল্যাণ ফাউন্ডেশন</h1>
        </header>
        <main style="padding: 20px; text-align: center;">
            <h3>স্বাগতম! আপনি সফলভাবে লগইন করেছেন।</h3>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
            onAuthStateChanged, signOut, updateProfile, 
            RecaptchaVerifier, signInWithPhoneNumber 
        } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // আপনার Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCe_CgQLWZND9e5rofK1z4mcnBptrLiZlo",
            authDomain: "rjfoundetion-25.firebaseapp.com",
            projectId: "rjfoundetion-25",
            storageBucket: "rjfoundetion-25.firebasestorage.app",
            messagingSenderId: "247020927055",
            appId: "1:247020927055:web:94d86ac7eb47b4e950d23a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        auth.languageCode = 'bn';

        const notify = (msg, type) => {
            const el = document.getElementById('auth-msg');
            el.innerHTML = msg;
            el.style.display = 'block';
            el.style.background = type === 'err' ? '#ffebee' : '#e8f5e9';
            el.style.color = type === 'err' ? '#c62828' : '#2e7d32';
        };

        window.showForm = (type) => {
            document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('signup-form').style.display = type === 'signup' ? 'block' : 'none';
            document.getElementById('auth-msg').style.display = 'none';
        };

        // --- ইমেইল সাইন আপ ---
        document.getElementById('signupSubmit').addEventListener('click', () => {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-pass').value;
            if(!name || !email || !pass) return notify("⚠️ সব তথ্য পূরণ করুন", "err");

            createUserWithEmailAndPassword(auth, email, pass).then((res) => {
                updateProfile(res.user, { displayName: name }).then(() => {
                    notify("✅ রেজিস্ট্রেশন সফল!", "success");
                });
            }).catch(e => notify("⚠️ ভুল তথ্য দিয়েছেন অথবা ইমেইলটি আগে ব্যবহার হয়েছে।", "err"));
        });

        // --- ইমেইল লগইন ---
        document.getElementById('loginSubmit').addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => notify("⚠️ ইমেইল বা পাসওয়ার্ড ভুল!", "err"));
        });

        // --- ফোন লগইন (OTP) ---
        window.setupRecaptcha = () => {
            if(!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            }
        };

        document.getElementById('sendOTP').addEventListener('click', () => {
            const phoneNumber = document.getElementById('phone-number').value;
            if (phoneNumber.length < 11) return notify("⚠️ সঠিক নম্বর দিন (যেমন: +88017...)", "err");

            setupRecaptcha();
            const appVerifier = window.recaptchaVerifier;

            signInWithPhoneNumber(auth, phoneNumber, appVerifier).then((confirmationResult) => {
                window.confirmationResult = confirmationResult;
                document.getElementById('otp-section').style.display = 'block';
                document.getElementById('sendOTP').style.display = 'none';
                notify("📩 কোড পাঠানো হয়েছে।", "success");
            }).catch(e => notify("⚠️ সমস্যা: " + e.message, "err"));
        });

        document.getElementById('verifyOTP').addEventListener('click', () => {
            const code = document.getElementById('otp-code').value;
            window.confirmationResult.confirm(code).catch(e => notify("⚠️ ভুল কোড!", "err"));
        });

        // --- অথেনটিকেশন চেক ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                document.getElementById('userNameDisplay').innerText = `স্বাগতম, ${user.displayName || user.phoneNumber}`;
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
            }
        });

        window.logoutUser = () => signOut(auth);
        window.toggleDarkMode = () => {
            document.body.classList.toggle('dark-theme');
            const icon = document.querySelector('#themeIcon i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        };
    </script>
</body>
</html>
