<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupsha Public Welfare Foundation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #1c1e21;
            --card-bg: #ffffff;
            --header-bg: #0f1c2c;
            --accent-color: #00ffaa;
            --font-family: 'Hind Siliguri', 'Poppins', sans-serif;
        }

        .dark-theme {
            --bg-color: #121212;
            --text-color: #e4e6eb;
            --card-bg: #242526;
            --header-bg: #000000;
        }

        body { font-family: var(--font-family); background: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; transition: all 0.4s ease; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Auth Screen */
        #auth-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f1c2c; padding: 20px; }
        .auth-container { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: #333; text-align: center; }
        .logo-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent-color); margin-bottom: 10px; object-fit: cover; }
        
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; margin-top: 10px; font-family: inherit; }
        .auth-btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; }
        .btn-primary { background: #0f1c2c; color: white; }
        .btn-google { background: white; color: #555; border: 1px solid #ddd; }
        
        /* Main Content / Dashboard */
        #main-content { display: none; flex-direction: column; min-height: 100vh; }
        header { background: var(--header-bg); padding: 30px 20px; color: white; position: relative; border-bottom: 4px solid var(--accent-color); text-align: center; }
        .top-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .control-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--accent-color); color: white; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 12px; }
        .user-welcome { font-size: 14px; color: var(--accent-color); font-weight: bold; }
        
        .dashboard-main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 30px 15px; text-align: center; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent-color); margin-bottom: 15px; display: none; }
        footer { padding: 15px; background: var(--header-bg); color: #888; text-align: center; font-size: 13px; margin-top: auto; }
        
        .divider { margin: 20px 0; border-bottom: 1px solid #eee; position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-container">
            <img src="https://i.ibb.co.com/ycsrjKp6/20251128-004458.jpg" alt="Logo" class="logo-img">
            <h2>লগইন করুন</h2>
            <input type="email" id="login-email" class="auth-input" placeholder="ইমেইল এড্রেস">
            <input type="password" id="login-pass" class="auth-input" placeholder="পাসওয়ার্ড">
            <button class="auth-btn btn-primary" id="loginSubmit">লগইন</button>
            
            <div class="divider"><span>অথবা</span></div>
            
            <button class="auth-btn btn-google" id="googleLogin">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Google দিয়ে ডিরেক্ট লগইন
            </button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <div class="top-controls">
                <button class="control-btn" onclick="toggleDarkMode()">ডার্ক মোড</button>
                <button class="control-btn" onclick="logoutUser()" style="color:#ff4d4d;">লগআউট</button>
            </div>
            <img src="https://i.ibb.co.com/ycsrjKp6/20251128-004458.jpg" alt="Logo" class="logo-img">
            <div class="user-welcome" id="userNameDisplay">প্রসেসিং...</div>
            <h1 style="color:white; margin:0;">রুপসা জনকল্যাণ ফাউন্ডেশন</h1>
        </header>

        <main class="dashboard-main">
            <img id="userPhoto" class="profile-pic" src="" alt="User">
            <h3>আপনি সফলভাবে ড্যাশবোর্ডে প্রবেশ করেছেন!</h3>
            <p>আপনার প্রোফাইল এখন সক্রিয়।</p>
        </main>

        <footer><p>© 2026 RJ Foundation</p></footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { 
            getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ-VBMlJsPscpM4RoxZDiPFOHfSzlLRDw",
            authDomain: "imran-bro-ddc88.firebaseapp.com",
            projectId: "imran-bro-ddc88",
            storageBucket: "imran-bro-ddc88.firebasestorage.app",
            messagingSenderId: "1088716769061",
            appId: "1:1088716769061:web:52874633d8d4d35927bccc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // গুগল লগইন ফাংশন (ডিরেক্ট পপ-আপ)
        document.getElementById('googleLogin').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    // লগইন হওয়া মাত্রই ড্যাশবোর্ড দেখাবে (onAuthStateChanged এর মাধ্যমে)
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                })
                .catch((error) => {
                    alert("গুগল লগইন করতে সমস্যা হয়েছে: " + error.message);
                });
        });

        // অথেনটিকেশন স্টেট চেক (পেজ লোড বা লগইন হওয়ার সাথে সাথে কাজ করবে)
        onAuthStateChanged(auth, (user) => {
            const authScreen = document.getElementById('auth-screen');
            const mainContent = document.getElementById('main-content');

            if (user) {
                // ইউজার থাকলে লগইন স্ক্রিন হাইড এবং ড্যাশবোর্ড শো
                authScreen.style.display = 'none';
                mainContent.style.display = 'flex';
                
                document.getElementById('userNameDisplay').innerText = `স্বাগতম, ${user.displayName}`;
                if(user.photoURL) {
                    const img = document.getElementById('userPhoto');
                    img.src = user.photoURL;
                    img.style.display = 'block';
                }
            } else {
                // ইউজার না থাকলে লগইন স্ক্রিন শো এবং ড্যাশবোর্ড হাইড
                authScreen.style.display = 'flex';
                mainContent.style.display = 'none';
            }
        });

        // লগআউট ফাংশন
        window.logoutUser = () => {
            signOut(auth).then(() => {
                location.reload(); // লগআউট হলে পেজ রিফ্রেশ হবে
            });
        };

        window.toggleDarkMode = () => {
            document.body.classList.toggle('dark-theme');
        };
    </script>
</body>
</html>
